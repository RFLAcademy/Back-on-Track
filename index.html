<!DOCTYPE html>
<html>
<head>
  <title>BackOnTrack - EYE Tracking</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
  

  <style>
    body {
  text-align: center;
  background: #000;
  color: #ffffff;
  font-family: Arial;
}
    video, canvas {
      border-radius: 10px;
    }
    video {
  filter: brightness(2) contrast(1.2);
  transform: scaleX(-1);
}

#timeDisplay{
  font-family: 'Digital-7 Mono', monospace;
  font-size: 90px;
  letter-spacing: 10px;

  color: #ff0000;

  background: transparent;
  border: none;
  box-shadow: none;

  display: inline-block;
}

  </style>
</head>

<body>
  <div style="display:flex; justify-content:center; gap:40px; align-items:center;">

  <div>
    <video id="video" width="640" height="480" autoplay muted></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
  </div>

<div style="text-align:center;">
  <div id="timeDisplay">00:00</div>
  <canvas id="pieChart" width="400" height="400"></canvas>
</div>

</div>

<h3 id="status">Detecting...</h3>

<script>
  const videoElement = document.getElementById('video');
  const canvasElement = document.getElementById('canvas');
  const canvasCtx = canvasElement.getContext('2d');
  const statusText = document.getElementById('status');

  async function getPostureState(){

  const response = await fetch(
  "https://back-on-track-af999-default-rtdb.firebaseio.com/posture_focus.json"
  );

  const posture = await response.json();

  return posture;
}
  let sessionStartTime = new Date();
  let focusStartTime = null;
  let notFocusStartTime = null;
  let isCurrentlyFocused = false;

  let smoothY = 0;
  let smoothHead = 0;

  // ===== CALIBRATION VARIABLES =====
  let calibrated = false;
  let calibrationStart = Date.now();
  let baselineHead = 0;
  let baselineEyeX = 0;

  let currentFaceID = null;
  let faceCounter = 0;
  let focusDuration = 0;
  let focusStartTrack = null;

  let totalFocusTime = 0;
  let totalNotFocusTime = 0;
  let lastStateChangeTime = Date.now();
  let lastState = null;

  let lastSentState = null;

  let facePreviouslyDetected = false;

  let humanPresent = false;
  let lastSeenTime = 0;

  const MIN_SESSION_TIME = 60000; // 60 sec

const faceDetection = new FaceDetection({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`;
  }
});

faceDetection.setOptions({
  model: "short",
  minDetectionConfidence: 0.5
});

faceDetection.onResults(results => {

  humanPresent = false;

  if(results.detections.length > 0){
    humanPresent = true;
    lastSeenTime = Date.now();
  }

});

  const faceMesh = new FaceMesh({
    locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
  });

  faceMesh.onResults(results => {
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.multiFaceLandmarks.length > 0) {
      if (!facePreviouslyDetected) {

  // RESET EVERYTHING
  totalFocusTime = 0;
  totalNotFocusTime = 0;

  lastState = null;
  lastStateChangeTime = Date.now();

  focusStartTime = null;
  notFocusStartTime = null;
  focusStartTrack = null;

  currentFaceID = null;
  faceCounter = 0;

  calibrated = false;
  calibrationStart = Date.now();

  updateChart();

}

facePreviouslyDetected = true;

      const landmarks = results.multiFaceLandmarks[0];

      // ===== EYE HORIZONTAL =====
      const rightEyeLeft = landmarks[33];
      const rightEyeRight = landmarks[133];
      const rightIris = landmarks[468];

      const eyeWidth = rightEyeRight.x - rightEyeLeft.x;
      const irisRelativeX = (rightIris.x - rightEyeLeft.x) / eyeWidth;

      // ===== EYE VERTICAL (UP ONLY) =====
      const eyeTop = landmarks[159];
      const eyeBottom = landmarks[145];
      const eyeHeight = eyeBottom.y - eyeTop.y;

      let rawY = (rightIris.y - eyeTop.y) / eyeHeight;
      smoothY = smoothY * 0.7 + rawY * 0.3;
      const irisRelativeY = smoothY;

      // ===== HEAD ROTATION =====
      const nose = landmarks[1];
      const leftCheek = landmarks[234];
      const rightCheek = landmarks[454];

      const faceWidth = rightCheek.x - leftCheek.x;
      let rawHead = (nose.x - leftCheek.x) / faceWidth;

      smoothHead = smoothHead * 0.7 + rawHead * 0.3;
      const headRelative = smoothHead;
      console.log("Head:", headRelative.toFixed(2));

      // ===== SIMPLE FACE SIGNATURE =====
// ===== SESSION FACE ID =====
if (currentFaceID === null) {
  faceCounter++;
  currentFaceID = faceCounter;
  console.log("Face ID:", currentFaceID);
}

      const now = Date.now();
      // ===== BACKGROUND CALIBRATION =====
if (!calibrated) {
  baselineHead = headRelative;
  baselineEyeX = irisRelativeX;
  calibrated = true;
}
      let lookingAway = false;

      // ===== RELATIVE THRESHOLDS =====

      // Strong head turn detection
if(headRelative < 0.20 || headRelative > 0.80){
  lookingAway = true;
}

    

      // Eye horizontal deviation
      if (Math.abs(irisRelativeX - baselineEyeX) > 0.1) {
        lookingAway = true;
      }

      // Eye UP detection
      if (irisRelativeY < 0.20) {
        lookingAway = true;
      }

      // ===== FOCUS LOGIC =====
      if (!lookingAway) {
        if (notFocusStartTime !== null) {
  notFocusStartTime = null;
}

        if (!isCurrentlyFocused) {

          if (focusStartTime === null) {
  focusStartTime = now;
} else if (now - focusStartTime < 3000) {
  statusText.innerText = "Checking...";
  return;
}

          if (now - focusStartTime >= 3000) {
            isCurrentlyFocused = true;
            if (focusStartTrack === null) {
  focusStartTrack = now;
}

focusDuration = Math.floor((now - focusStartTrack) / 1000);

statusText.innerText = "FOCUSED ✅";
                       if (lastState !== "focused") {
  lastState = "focused";
  lastStateChangeTime = now;
}
            if(lastSentState !== 1){

  lastSentState = 1;

fetch("https://back-on-track-af999-default-rtdb.firebaseio.com/eye_focus.json",{
    method:"PUT",
    body: JSON.stringify(1)
  });

}

          }

        } else {
          if (focusStartTrack === null) {
  focusStartTrack = now;
}

focusDuration = Math.floor((now - focusStartTrack) / 1000);

statusText.innerText = "FOCUSED ✅ ";
                       if (lastState !== "focused") {
  lastState = "focused";
  lastStateChangeTime = now;
}
          if(lastSentState !== 1){

  lastSentState = 1;

fetch("https://back-on-track-af999-default-rtdb.firebaseio.com/eye_focus.json",{
    method:"PUT",
    body: JSON.stringify(1)
  });

}

        }

      } else {

  // Reset focus confirmation timer
  focusStartTime = null;

  if (notFocusStartTime === null) {
    notFocusStartTime = now;
  }

  // Only mark NOT FOCUSED if distraction lasts 2 seconds
  if (now - notFocusStartTime >= 2000) {
    isCurrentlyFocused = false;
    statusText.innerText = "NOT FOCUSED ❌ ";
    focusStartTrack = null;
    if (lastState !== "notfocused") {
  lastState = "notfocused";
  lastStateChangeTime = now;
}
    if(lastSentState !== 0){

  lastSentState = 0;

fetch("https://back-on-track-af999-default-rtdb.firebaseio.com/eye_focus.json",{
    method:"PUT",
    body: JSON.stringify(0)
  });

}
  } else {
    statusText.innerText = "Checking...";
  }

}

    } else {

  const now = Date.now();

  isCurrentlyFocused = false;
  focusStartTime = null;

  if(now - lastSeenTime < 5000){

    // Head turned but person still present
    statusText.innerText = "HEAD TURNED / NOT FOCUSED";

    if (lastState !== "notfocused") {
      lastState = "notfocused";
      lastStateChangeTime = now;
    }

  } else {

    // Person actually left
    statusText.innerText = "NO HUMAN PRESENT";

    facePreviouslyDetected = false;

    downloadCSV();
    totalFocusTime = 0;
    totalNotFocusTime = 0;
    sessionStartTime = new Date();

    lastState = null;
    lastStateChangeTime = now;

    currentFaceID = null;
    faceCounter = 0;

    calibrated = false;

    updateChart();

  }

}
  });

  const camera = new Camera(videoElement, {
    onFrame: async () => {
      await faceMesh.send({image: videoElement});
      await faceDetection.send({image: videoElement});
    },
    width: 640,
    height: 480
  });
const ctx = document.getElementById('pieChart').getContext('2d');

const pieChart = new Chart(ctx, {
  type: 'pie',
  data: {
    labels: ['Focused', 'Not Focused'],
    datasets: [{
      data: [0, 0],
      backgroundColor: ['#4CAF50', '#F44336']
    }]
  },
  options: {
    responsive: false,
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          color: "white"
        }
      },
      datalabels: {
        color: "white",
        font: {
          weight: "bold",
          size: 20
        },
        formatter: (value) => value.toFixed(1) + "%"
      }
    }
  },
  plugins: [ChartDataLabels]
});

function downloadCSV(){

  const sessionEndTime = new Date();

  const date = sessionEndTime.toLocaleDateString();
  const startTime = sessionStartTime.toLocaleTimeString();
  const endTime = sessionEndTime.toLocaleTimeString();

const total = totalFocusTime + totalNotFocusTime;

// Do not save if session < 60 sec
if(total < MIN_SESSION_TIME){
  console.log("Session too short, CSV not saved");
  return;
}

  const focusPercent = ((totalFocusTime / total) * 100).toFixed(2);
  const notFocusPercent = ((totalNotFocusTime / total) * 100).toFixed(2);

  const csvContent =
    "Date,Start Time,End Time,Focused %,Not Focused %\n" +
    date + "," + startTime + "," + endTime + "," + focusPercent + "," + notFocusPercent;

  const blob = new Blob([csvContent], { type: "text/csv" });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;

  a.download =
  "focus_session_" +
  sessionEndTime.getFullYear()+"-"+(sessionEndTime.getMonth()+1)+"-"+sessionEndTime.getDate()+"_" +
  sessionEndTime.getHours()+"-"+sessionEndTime.getMinutes()+"-"+sessionEndTime.getSeconds() +
  ".csv";

  a.click();

}

function updateChart() {
  const total = totalFocusTime + totalNotFocusTime;

  const totalSeconds = Math.floor(total / 1000);
const minutes = Math.floor(totalSeconds / 60);
const seconds = totalSeconds % 60;

const formatted =
  String(minutes).padStart(2,'0') + ":" +
  String(seconds).padStart(2,'0');

document.getElementById("timeDisplay").innerText = formatted;
  if (total === 0) return;

const focusPercent = (totalFocusTime / total) * 100 || 0;
const notFocusPercent = (totalNotFocusTime / total) * 100 || 0;

  pieChart.data.datasets[0].data = [focusPercent, notFocusPercent];
  pieChart.update();
}
async function updateLiveTime() {

  const now = Date.now();

  const response = await fetch(
  "https://back-on-track-af999-default-rtdb.firebaseio.com/posture_focus.json"
  );

  const postureFocus = await response.json();

  let eyeFocus = isCurrentlyFocused;

  let finalFocus = eyeFocus && postureFocus;

  if (finalFocus) {

    totalFocusTime += now - lastStateChangeTime;
    lastStateChangeTime = now;

  } else {

    totalNotFocusTime += now - lastStateChangeTime;
    lastStateChangeTime = now;

  }

  updateChart();
}
setInterval(updateLiveTime, 2000);
setInterval(() => {
  const display = document.getElementById("timeDisplay");
  display.style.opacity = display.style.opacity === "0.7" ? "1" : "0.7";
}, 500);
  camera.start();
</script>





</body>
</html>
